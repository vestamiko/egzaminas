<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Dienos pietūs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

header {
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
}

button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.add-btn {
  background: #2d7ef7;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1c1c1c;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-body {
  padding: 10px;
}

.price {
  color: #aaa;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}

.modal input, .modal textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
}

.actions {
  display: flex;
  gap: 5px;
  margin-top: 8px;
}
</style>
</head>

<body>

<header>🍽️ Dienos pietūs</header>

<div class="top-bar">
    <div id="cart" style="padding: 20px; background:#141414;"></div>
  <button class="add-btn" onclick="openModal()">+ Pridėti patiekalą</button>
  <div class="auth-buttons" id="auth"></div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Pridėti patiekalą</h3>

    <input id="title" placeholder="Pavadinimas">
    <input id="price" placeholder="Kaina">
    <textarea id="desc" placeholder="Aprašymas"></textarea>

    <button onclick="addDish()">Pridėti</button>
    <button onclick="closeModal()">Uždaryti</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
